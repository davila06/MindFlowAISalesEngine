name: Security SAST DAST Gate

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  sast-dotnet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build -c Release --no-restore
      - name: Test
        run: dotnet test -c Release --no-build
      - name: Package Vulnerability Scan
        run: dotnet list package --vulnerable --include-transitive

  dast-baseline:
    runs-on: ubuntu-latest
    needs: sast-dotnet
    steps:
      - name: Baseline DAST placeholder
        run: |
          echo "Run OWASP ZAP baseline against staging endpoint in secured environments"
          echo "This repository keeps the gate definition and requires env-specific target URL/secrets."
